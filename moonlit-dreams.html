<style>
/* Disgusting hodgepodge between index.css, yarg.css and new stuff. I'm not making another .css file, this is easier :) */
body {
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	flex-direction: column;
	font-family: 'Itim', sans-serif;
	color: white;

}

main {
	display: flex;
	flex-grow: 1;
	justify-content: center;
	align-items: center;
	flex-direction: row;
	gap: 20px;
}

@media (max-width: 1072px) {
  main {
    flex-direction: column;
  }
}

section {
	width: 100%;
	max-width: 600px;
	padding: 20px;
	margin-bottom: 10px;
	box-sizing: border-box;
}

section iframe,
section lite-youtube {
	max-width: 100%;
	border: none;
}

footer {
	width: 90%;
	text-align: center;
	padding: 20px;
}

lite-youtube {
	display: block;
	width: 100%;
	border-radius: 1em;
	aspect-ratio: 16 / 9;
	position: relative;
}

/* Button */
a.coolbutton:link, a.coolbutton:visited {
	color: white;
	background-color: #2bc0f4;
	padding: 0.32em 1em;
	border-radius: 0.50em;
	font-size: 1.25rem;
	text-decoration: none;
	transition: 0.15s ease;
}
a.coolbutton:hover, a.coolbutton:active {
	background-color: #0484d1;
	font-size: 1.2rem;
	box-shadow:
1px 1px black,
2px 2px black,
3px 3px black,
4px 4px black;
}

.youtube-bs {
  font-size: 12px;
  color: #888;
  background-color: black;
  margin-top: 6px;
  line-height: 1.2;
  text-align: center;
}

.youtube-bs a {
  color: #777;
  text-decoration: underline;
}

.youtube-bs a:hover {
  color: #333;
}

/* BG viddy! */
#trailer {
	position: fixed;
	right: 0;
	bottom: 0;
	min-width: 100%;
	min-height: 100%;
}
@media (prefers-reduced-motion: reduce) {
	#trailer {
		display: none;
	}
}
</style>
</head>
